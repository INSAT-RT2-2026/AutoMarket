    <section class="sell-page">

        <div class="sell-container">
            <h2>Sell Your Car</h2>
            <p class="subtitle">List your vehicle and reach premium buyers</p>

            <form id="sellForm">

                <div class="form-grid">
                    <input type="text" name="brand" placeholder="Brand" required>
                    <input type="text" name="model" placeholder="Model" required>
                    <input type="number" name="year" placeholder="Year" required>
                    <input type="number" name="price" placeholder="Price (DT)" required>
                    <input type="number" name="horsepower" placeholder="Horsepower" required>
                </div>

                <textarea name="description" placeholder="Describe your car..." required></textarea>

                <div class="form-grid">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="text" name="phone" placeholder="Phone Number" required>
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="file-upload">
                    <label>Upload Car Images</label>
                    <input type="file" name="images[]" multiple accept="image/*" required>
                </div>

                <button type="submit" class="submit-btn">Submit Car</button>

                
            </form>
            <p id="responseMsg"></p>
        </div>

    </section>

    <script src="sell.js"></script>

</body>
