<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TunLuxAuto - My Inquiries</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <style>
        .history-page {
            min-height: 100vh;
            background: #0a0a0a;
            padding: 6rem 5% 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .history-page h2 {
            color: #d4af37;
            font-size: 2rem;
            margin-bottom: 0.4rem;
            animation: slideUp 0.7s both;
        }

        .history-subtitle {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            animation: slideUp 0.7s 0.15s both;
        }

        .history-list {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .inquiry-card {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 1.5rem;
            animation: slideUp 0.7s both;
            position: relative;
            overflow: hidden;
        }

        .inquiry-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #d4af37;
            border-radius: 3px 0 0 3px;
        }

        .inquiry-card.answered::before {
            background: #00c896;
        }

        .inquiry-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .inquiry-car {
            color: #d4af37;
            font-weight: bold;
            font-size: 1rem;
        }

        .inquiry-car.no-car {
            color: #888;
            font-style: italic;
            font-weight: normal;
        }

        .inquiry-date {
            color: #666;
            font-size: 0.8rem;
        }

        .inquiry-message {
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .inquiry-message.no-message {
            color: #555;
            font-style: italic;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .status-badge.pending {
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .status-badge.answered {
            background: rgba(0, 200, 150, 0.15);
            color: #00c896;
            border: 1px solid rgba(0, 200, 150, 0.3);
        }

        .admin-reply {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 200, 150, 0.05);
            border: 1px solid rgba(0, 200, 150, 0.2);
            border-radius: 10px;
        }

        .admin-reply-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #00c896;
            margin-bottom: 0.4rem;
        }

        .admin-reply p {
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            animation: slideUp 0.7s both;
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .empty-state p {
            color: #888;
            margin-bottom: 1.5rem;
        }

        .empty-state a {
            display: inline-block;
            padding: 12px 32px;
            background: #d4af37;
            color: black;
            font-weight: bold;
            border-radius: 25px;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .empty-state a:hover {
            transform: scale(1.05);
        }

        .loading-text {
            color: #888;
            text-align: center;
            padding: 3rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">TunLuxAuto</a>
        <div class="nav-links">
            <a href="index.html#home">Home</a>
            <a href="index.html#collection">Collection</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" class="nav-login-btn" id="navAuthBtn">Login</a>
            <div id="navUserMenu">
                <span id="navUserName" class="nav-login-btn">Me</span>
                <div id="navDropdown">
                    <div id="navDropdownHello">Hello, User!</div>
                    <a href="#" onclick="logout()">➜ Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="history-page">
        <h2>My Inquiries</h2>
        <p class="history-subtitle">Track your inquiries and our responses.</p>
        <div class="history-list" id="historyList">
            <p class="loading-text">Loading your inquiries...</p>
        </div>
    </div>

    <script>
        function updateNavbar() {
            const user = localStorage.getItem('user');
            const navAuthBtn = document.getElementById('navAuthBtn');
            const navUserMenu = document.getElementById('navUserMenu');
            const navUserName = document.getElementById('navUserName');
            if (!navAuthBtn) return;
            if (user) {
                const parsed = JSON.parse(user);
                navAuthBtn.style.display = 'none';
                navUserMenu.style.display = 'block';
                navUserName.textContent = parsed.name.charAt(0).toUpperCase();
                const helloEl = document.getElementById('navDropdownHello');
                if (helloEl) helloEl.textContent = 'Hello ' + parsed.name + '!';
                navUserName.onclick = function() {
                    const dropdown = document.getElementById('navDropdown');
                    dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
                };
            } else {
                navAuthBtn.style.display = 'block';
                navUserMenu.style.display = 'none';
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function formatDate(timestamp) {
            const d = new Date(timestamp);
            return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function renderHistory(contacts) {
            const list = document.getElementById('historyList');

            if (contacts.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>You haven't made any inquiries yet.</p>
                        <a href="index.html#collection">Browse Collection</a>
                    </div>
                `;
                return;
            }

            list.innerHTML = contacts.map((c, i) => `
                <div class="inquiry-card ${c.status}" style="animation-delay: ${i * 0.1}s">
                    <div class="inquiry-header">
                        <span class="inquiry-car ${!c.car_name ? 'no-car' : ''}">
                            ${c.car_name ? '🚗 ' + c.car_name : 'General inquiry'}
                        </span>
                        <span class="inquiry-date">${formatDate(c.submitted_at)}</span>
                    </div>
                    <p class="inquiry-message ${!c.message ? 'no-message' : ''}">
                        ${c.message || 'No message provided'}
                    </p>
                    <span class="status-badge ${c.status}">${c.status}</span>
                    ${c.admin_reply ? `
                        <div class="admin-reply">
                            <div class="admin-reply-label">Team Response</div>
                            <p>${c.admin_reply}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const raw = localStorage.getItem('user');
            if (!raw) {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(raw);
            updateNavbar();

            fetch('/backend/history.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: user.id })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    renderHistory(data.contacts);
                } else {
                    document.getElementById('historyList').innerHTML =
                        '<p class="loading-text">Could not load inquiries.</p>';
                }
            })
            .catch(() => {
                document.getElementById('historyList').innerHTML =
                    '<p class="loading-text">Something went wrong.</p>';
            });

            document.addEventListener('click', function(e) {
                const menu = document.getElementById('navUserMenu');
                const dropdown = document.getElementById('navDropdown');
                if (menu && dropdown && !menu.contains(e.target)) {
                    dropdown.style.display = 'none';
                }

                document.addEventListener('click', (event) => {
                    const navUserMenu = document.getElementById('navUserMenu');
                    const navDropdown = document.getElementById('navDropdown');
                    if (!navUserMenu || !navDropdown) return;
                    if (!navUserMenu.contains(event.target)) {
                        navDropdown.style.display = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
