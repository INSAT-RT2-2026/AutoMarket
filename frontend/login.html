<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TunLuxAuto - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">TunLuxAuto</a>
        <div class="nav-links">
            <a href="index.html#home">Home</a>
            <a href="index.html#collection">Collection</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
    <div class="auth-page">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your account</p>
            <div class="form-field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="form-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button class="auth-btn" onclick="login()">Sign In</button>
            <p class="auth-switch">Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
