<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TunLuxAuto - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <nav class="navbar">
        <a href="indx.html" class="logo">TunLuxAuto</a>
        <div class="nav-links">
            <a href="indx.html#home">Home</a>
            <a href="indx.html#collection">Collection</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
    <div class="auth-page">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join TunLuxAuto today</p>
            <div class="form-field">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe">
            </div>
            <div class="form-field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="form-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div class="form-field">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <button class="auth-btn" onclick="register()">Create Account</button>
            <p class="auth-switch">Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
