<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TunLuxAuto - Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">TunLuxAuto</div>
        <div class="nav-links">
            <a href="indx.html#home">Home</a>
            <a href="indx.html#collection">Collection</a>
            <a href="#" style="color:#d4af37;">Contact</a>
        </div>
    </nav>
    <div class="contact-page">
        <h2>Get In Touch</h2>
        <p class="subtitle">Our team will reach out within 24 hours.</p>
        <div class="contact-form-card">
            <div id="formSection">
                <div class="form-field">
                    <div id = "selectedCar" style = "display : none ;" class = "selected-car-box">
                        <p id = "selectedCarText"></p>
                    </div>
                    <input type = "hidden" id = "carInterest">                    
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe">
                </div>
                <div class="form-field">
                    <label for="message">Message</label>
                    <textarea id="message" placeholder="Any questions or notes..." rows="3"></textarea>
                </div>
                <div class="form-field">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+216 XX XXX XXX">
                </div>
                <div class="form-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>
                <button class="form-submit-btn" onclick="submitForm()">Send Inquiry</button>
            </div>
            <div class="thank-you-box" id="thankYou">
                <div class="check-circle">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h3>Thank You!</h3>
                <p>Your inquiry has been received.<br>Our team will contact you shortly.</p>
                <a href="indx.html" class="back-link">← Return to collection</a>
            </div>
        </div>
    </div>
    <script src="contact.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init("kRNQJu-FESiieWHfm")</script>
</body>
</html>
